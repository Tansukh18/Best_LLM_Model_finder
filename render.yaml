services:
  - type: web
    name: perfect-llm-finder-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_KEY
        sync: false
      - key: BUCKET_NAME
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
